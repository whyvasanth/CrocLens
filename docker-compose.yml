services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: croclens
      POSTGRES_USER: croclens
      POSTGRES_PASSWORD: croclens
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U croclens -d croclens"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - croclens_postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      APP_ENV: local
      AUTH_MODE: local
      DATABASE_URL: postgresql+psycopg://croclens:croclens@postgres:5432/croclens
      RATE_LIMIT_PER_MINUTE: "300"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
      python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8000"
    depends_on:
      api:
        condition: service_healthy
    environment:
      CROCLENS_API_URL: "http://api:8000"
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"

volumes:
  croclens_postgres_data:
