name: CrocLens CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: croclens-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/api/requirements.txt

      - name: Check Python dependency consistency
        run: python -m pip check

      - name: Run backend tests
        run: python -m pytest apps/api

      - name: Validate Alembic migrations are discoverable
        run: python -m alembic -c apps/api/alembic.ini heads

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit production web dependencies
        run: npm audit --omit=dev

      - name: Typecheck web app
        run: npm run typecheck:web

      - name: Run web unit and smoke tests
        run: npm run test:web

      - name: Build web app
        run: npm run build:web

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run Playwright smoke tests
        run: npm run test:e2e --workspace @croclens/web
